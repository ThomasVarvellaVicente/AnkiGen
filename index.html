<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ankIMAT | Atomic Export Pipeline</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    
    <header>
        <div class="logo">ank<span>IMAT</span></div>
        <p class="subtitle">Atomic Flashcard Export Engine</p>
    </header>

    <main id="app">
        <section id="upload-stage" class="glass-card">
            <div class="card-header">
                <span class="step-badge">Step 1</span>
                <h2>Data Ingestion</h2>
            </div>
            
            <textarea id="raw-input" placeholder="Front: Concept | Back: Definition | Tags: Subject"></textarea>
            
            <div class="upload-controls">
                <div class="file-input-group">
                    <label for="image-upload" class="custom-file-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
                        Attach Image Assets
                    </label>
                    <input type="file" id="image-upload" multiple accept="image/*">
                    <span id="file-list-count">0 assets ready</span>
                </div>
                <button id="process-btn" class="glow-btn">Initialize Pipeline</button>
            </div>
        </section>

        <section id="sift-stage" class="glass-card hidden">
            <div class="card-header">
                <span class="step-badge">Step 2</span>
                <h2>Atomic Sifting</h2>
                <div class="badge-count"><span id="card-count">0</span> Cards</div>
            </div>
            
            <div id="card-grid" class="review-grid"></div>
            
            <div class="action-footer">
                <button id="export-btn" class="success-btn">Download Import-Ready CSV</button>
                <button id="reset-btn" class="ghost-btn">Reset Pipeline</button>
            </div>
        </section>
    </main>

    <footer class="footer-note">
        <p><strong>Pro Tip:</strong> After downloading, move your images to Anki's <code>collection.media</code> folder.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
