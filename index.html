<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnkiGen | Intelligent Pipeline</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">Anki<span>GEN</span></div>
            <div class="status-indicator">
                <span class="status-dot"></span> System Ready
            </div>
        </div>
    </nav>

    <main class="container">
        <section id="upload-stage" class="stage-container">
            <div class="section-meta">
                <span class="step-count">01</span>
                <h1>Source Ingestion</h1>
                <p>Paste your atomic data points and map your visual assets.</p>
            </div>
            
            <div class="glass-panel main-editor">
                <textarea id="raw-input" placeholder="Front: Cardiac Output | Back: Stroke Volume x Heart Rate | Tags: Cardiology"></textarea>
                
                <div class="editor-footer">
                    <div class="asset-manager">
                        <label for="image-upload" class="asset-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span>Attach Assets</span>
                        </label>
                        <input type="file" id="image-upload" multiple accept="image/*" class="hidden-input">
                        <span id="file-list-count" class="asset-counter">0 files attached</span>
                    </div>
                    <button id="process-btn" class="btn-primary">Initialize Pipeline</button>
                </div>
            </div>
        </section>

        <section id="sift-stage" class="stage-container hidden">
            <div class="section-meta">
                <div class="meta-left">
                    <span class="step-count">02</span>
                    <h1>Atomic Sifting</h1>
                </div>
                <div class="stats-badge">
                    <span id="card-count">0</span> Cards in Queue
                </div>
            </div>
            
            <div id="card-grid" class="modern-grid"></div>
            
            <div class="sticky-actions">
                <div class="actions-wrapper">
                    <button id="reset-btn" class="btn-secondary">Discard Session</button>
                    <button id="export-btn" class="btn-primary glow">Download Optimized CSV</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
